name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Bug Fixes
    labels:
      - fix
      - bugfix
      - bug
  - title: Maintenance
    labels:
      - chore
      - dependencies
      - ci

autolabeler:
  - label: feature
    title:
      - '/^feat(\(.+\))?[!]?:/'
  - label: fix
    title:
      - '/^fix(\(.+\))?[!]?:/'
  - label: chore
    title:
      - '/^(chore|ci|docs|style|refactor|perf|test|build)(\(.+\))?[!]?:/'
  - label: major
    title:
      - '/^[a-z]+(\(.+\))?!:/'

change-template: "- $TITLE (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bugfix
      - bug
      - chore
      - dependencies
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
